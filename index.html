<!DOCTYPE html>
<html>

<head>

<title>Weather App</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<h1>Weather App 🌤️</h1>


<input 
type="text" 
id="city" 
placeholder="Enter city name">


<button onclick="getWeather()">
Search
</button>



<div class="weather">


<img id="icon" src="https://openweathermap.org/img/wn/01d.png" alt="Weather Icon">


<h2 id="cityName"></h2>


<h3 id="temperature"></h3>


<p id="description"></p>


<p id="humidity"></p>


<p id="wind"></p>


</div>



</div>



<script src="script.js"></script>


</body>

</html>
